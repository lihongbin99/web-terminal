<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Terminal</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
</head>
<body>
    <!-- Login Page -->
    <div id="login-container">
        <div class="login-box">
            <h1>Web Terminal</h1>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" autocomplete="username" required>
                <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
                <button type="submit" id="login-btn">Login</button>
                <p id="login-error" class="error"></p>
            </form>
        </div>
    </div>

    <!-- Directory Selection Page -->
    <div id="dir-container" style="display:none;">
        <div class="dir-box">
            <h1>Select Working Directory</h1>
            <div class="dir-input-group">
                <input type="text" id="dir-input" placeholder="Enter directory path (e.g. D:\Code\MyProject)">
                <button id="dir-go-btn" type="button">Open</button>
            </div>
            <div id="dir-list"></div>
            <button id="dir-default-btn" type="button" class="dir-default">Use Default Directory</button>
        </div>
    </div>

    <!-- Terminal Page -->
    <div id="terminal-container" style="display:none;">
        <div id="terminal"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
    <script src="/terminal.js"></script>
</body>
</html>
